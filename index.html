<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Game Lab - ミニゲーム集</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Trebuchet MS, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
        color: white;
        min-height: 100vh;
      }

      header {
        padding: 40px 24px;
        background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
        border-bottom: 2px solid #38bdf8;
        box-shadow: 0 8px 32px rgba(56, 189, 248, 0.1);
        text-align: center;
      }

      header h1 {
        font-size: 40px;
        font-weight: 800;
        background: linear-gradient(135deg, #38bdf8 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }

      header p {
        font-size: 14px;
        color: #94a3b8;
        margin: 0;
      }

      main {
        padding: 48px 24px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .intro-section {
        text-align: center;
        margin-bottom: 48px;
      }

      .intro-section h2 {
        font-size: 28px;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #38bdf8 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .intro-section p {
        color: #cbd5e1;
        line-height: 1.8;
        font-size: 16px;
        max-width: 600px;
        margin: 0 auto;
      }

      .ad-space-top {
        margin-bottom: 48px;
        padding: 12px;
        background: rgba(30, 41, 59, 0.5);
        border-radius: 8px;
        border: 1px solid #334155;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70px;
      }

      .game-section {
        margin-bottom: 48px;
      }

      .game-section h3 {
        font-size: 20px;
        margin-bottom: 24px;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
      }

      .game-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        margin-bottom: 24px;
      }

      .game-card {
        padding: 28px;
        border-radius: 16px;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 2px solid #334155;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .game-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.1), transparent);
        transition: left 0.5s ease;
      }

      .game-card:hover {
        border-color: #38bdf8;
        box-shadow: 0 8px 24px rgba(56, 189, 248, 0.15);
        transform: translateY(-8px);
      }

      .game-card:hover::before {
        left: 100%;
      }

      .game-card h2 {
        margin: 0 0 16px 0;
        font-size: 24px;
        color: #e2e8f0;
      }

      .game-links {
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: relative;
        z-index: 1;
      }

      .button {
        display: inline-block;
        padding: 14px 24px;
        border-radius: 8px;
        background: linear-gradient(135deg, #38bdf8 0%, #06b6d4 100%);
        color: #082f49;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        transition: all 0.3s ease;
        font-size: 14px;
        cursor: pointer;
        border: none;
      }

      .button:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
      }

      .button:active {
        transform: scale(0.98);
      }

      .ad-space-bottom {
        margin-top: 48px;
        padding: 12px;
        background: rgba(30, 41, 59, 0.5);
        border-radius: 8px;
        border: 1px solid #334155;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70px;
      }

      footer {
        text-align: center;
        padding: 24px;
        color: #64748b;
        font-size: 12px;
        border-top: 1px solid #334155;
        margin-top: 48px;
      }

      @media (max-width: 768px) {
        header h1 {
          font-size: 28px;
        }

        main {
          padding: 24px 16px;
        }

        .game-list {
          grid-template-columns: 1fr;
        }

        .game-card {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🎮 Mini Game Lab</h1>
      <p>ミニゲーム集 - カジュアルゲームの楽園</p>
    </header>

    <main>
      <div class="intro-section">
        <h2>ようこそ！</h2>
        <p>
          クオリティの高い無料ミニゲームを集めたサイトです。
          好きなゲームを選んで、今すぐ遊び始めましょう！
          新作ゲームはどんどん追加予定です。
        </p>
      </div>

      <!-- 上部広告枠 -->
      <div class="ad-space-top">
        <!-- admax -->
        <script src="https://adm.shinobi.jp/s/238e85d72e7749383cf9c35b230c7584"></script>
        <!-- admax -->
      </div>

      <!-- ゲーム一覧 -->
      <div class="game-section">
        <h3>🎯 人気ゲーム</h3>

        <div class="game-list">
          <div class="game-card">
            <h2>🏰 Dungeon RPG</h2>
            <div class="game-links">
              <a href="dungeon-rpg.html" class="button">プレイ</a>
            </div>
          </div>

          <div class="game-card">
            <h2>🌍 Survivor</h2>
            <div class="game-links">
              <a href="survivor.html" class="button">プレイ</a>
            </div>
          </div>

          <div class="game-card">
            <h2>🐱 にゃんこ</h2>
            <div class="game-links">
              <a href="cat.html" class="button">プレイ</a>
            </div>
          </div>
        </div>
      </div>

      <!-- 下部広告枠 -->
      <div class="ad-space-bottom">
        <!-- admax -->
        <script src="https://adm.shinobi.jp/s/238e85d72e7749383cf9c35b230c7584"></script>
        <!-- admax -->
      </div>
    </main>

    <footer>
      <p>&copy; 2024 Mini Game Lab. All rights reserved.</p>
    </footer>
  </body>
</html>
