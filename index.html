<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Game Lab</title>

    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #0f172a;
        color: white;
      }

      header {
        padding: 20px;
        background: #020617;
        font-size: 24px;
        font-weight: bold;
      }

      main {
        padding: 24px;
      }

      h1 {
        font-size: 36px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.7;
      }

      .game-list {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }

      .game-card {
        padding: 20px;
        border-radius: 16px;
        background: #1e293b;
        border: 1px solid #334155;
      }

      .game-card h2 {
        margin-top: 0;
      }

      .button {
        display: inline-block;
        margin-top: 12px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #38bdf8;
        color: #082f49;
        font-weight: bold;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <header>Mini Game Lab</header>

    <main>
      <h1>無料ミニゲーム集</h1>

      <p>
        ここに、これから作ったミニゲームをどんどん追加していきます。
      </p>

      <div class="game-list">
        <div class="game-card">
          <h2>Tap Score</h2>
        <a href="dungeon-rpg.html">Dungeon RPGを遊ぶ</a>

        </div>
      </div>
    </main>
  </body>
</html>
